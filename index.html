<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/normalize.css">
    <title>Admin Dashboard | The Odin Project</title>
</head>

<body>
    <header class="cabecera">

        <div class="parteSuperior">
            <img class="buscar" src="./img/search.svg" alt="icono-buscar" width="32px" height="32px">
            <input type="search" class="barraBusqueda">
            <img class="campana" src="./img/bell-ringing-light.svg" alt="icono-campana" width="32px" height="32px">
            <a href="#" class="avatar">
                <img src="https://api.dicebear.com/10.x/thumbs/svg" alt="avatar" width="48px" height="48px" />
                <p>Frange G</p>
            </a>
        </div>

        <div class="perfilNav">
            <img class="iconAvatar" src="https://api.dicebear.com/10.x/thumbs/svg" alt="avatar" width="64px"
                height="64px" />
            <div class="descripcionPerfil">
                <p>Hola a todos!</p>
                <h1>Frange G (@frang)</h1>
            </div>

            <div class="botones">
                <button>Nuevo</button>
                <button>Actualizar</button>
                <button>Compartir</button>
            </div>
        </div>

    </header>

    <aside class="barraLateral">
        <div class="tituloSuperior">
            <img class="svg" src="./img/view-dashboard.svg" alt="icono-dashboard" width="64px" height="64px">
            <h1>Dashboard</h1>
        </div>

        <div class="navCentral">
            <div class="home navLat">
                <img class="svg" src="./img/home-12.svg" alt="icono-home" width="32px" height="32px">
                <h2>Home</h2>
            </div>
            <div class="perfil navLat">
                <img class="svg" src="./img/id-card-outline.svg" alt="icono-perfil" width="32px" height="32px">
                <h2>Perfil</h2>
            </div>
            <div class="perfil navLat">
                <img class="svg" src="./img/message.svg" alt="icono-mensaje" width="32px" height="32px">
                <h2>Mensaje</h2>
            </div>
            <div class="historial navLat">
                <img class="svg" src="./img/history-3-outline.svg" alt="icono-historial" width="32px" height="32px">
                <h2>Historial</h2>
            </div>
            <div class="tareas navLat">
                <img class="svg" src="./img/task-list.svg" alt="icono-tareas" width="32px" height="32px">
                <h2>Tareas</h2>
            </div>
            <div class="comunidad navLat">
                <img class="svg" src="./img/group-line.svg" alt="icono-comunidad" width="32px" height="32px">
                <h2>Comunidad</h2>
            </div>
        </div>

        <div class="navInf">
            <div class="configuracion navLat">
                <img class="svg" src="./img/settings-outline.svg" alt="icono-configuracion" width="32px" height="32px">
                <h2>Configuracion</h2>
            </div>
            <div class="soporte navLat">
                <img class="svg" src="./img/customer-support.svg" alt="icono-soporte" width="32px" height="32px">
                <h2>Soporte</h2>
            </div>
            <div class="privacidad navLat">
                <img class="svg" src="./img/privacy-tip-outline-rounded.svg" alt="icono-privacidad" width="32px"
                    height="32px">
                <h2>Privacidad</h2>
            </div>
        </div>

    </aside>

</body>

</html>
