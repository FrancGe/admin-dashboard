<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/normalize.css">
    <title>Admin Dashboard | The Odin Project</title>
</head>

<body>
    <header class="cabecera">

        <div class="parteSuperior">
            <img src="./img/search.svg" alt="icono-buscar">
            <div class="barraBusqueda"></div>
            <img src="./img/bell-ringing-light.svg" alt="icono-campana">
            <img src="https://api.dicebear.com/10.x/thumbs/svg" alt="avatar" width="64px" height="64px" />
            <p>Frange G</p>
        </div>

        <div class="perfil">
            <img src="https://api.dicebear.com/10.x/thumbs/svg" alt="avatar" width="64px" height="64px" />
            <p>Hola a todos!</p>
            <h1>Frange G (@frang)</h1>
        </div>

        <div class="navHeader">
            <button>Nuevo</button>
            <button>Actualizar</button>
            <button>Compartir</button>
        </div>

    </header>

    <aside class="barraLateral">
        <div class="tituloSuperior">
            <img src="./img/view-dashboard.svg" alt="icono-dashboard">
            <h1>Dashboard</h1>
        </div>

        <div class="navCentral">
            <div class="home navLat">
                <img src="./img/home-12.svg" alt="icono-home">
                <h2>Home</h2>
            </div>
            <div class="perfil navLat">
                <img src="./img/id-card-outline.svg" alt="icono-perfil">
                <h2>Perfil</h2>
            </div>
            <div class="perfil navLat">
                <img src="./img/message.svg" alt="icono-mensaje">
                <h2>Mensaje</h2>
            </div>
            <div class="historial navLat">
                <img src="./img/history-3-outline.svg" alt="icono-historial">
                <h2>Historial</h2>
            </div>
            <div class="tareas navLat">
                <img src="./img/task-list.svg" alt="icono-tareas">
                <h2>Tareas</h2>
            </div>
            <div class="comunidad navLat">
                <img src="./img/group-line.svg" alt="icono-comunidad">
                <h2>Comunidad</h2>
            </div>
        </div>

        <div class="navInf">
            <div class="configuracion navLat">
                <img src="./img/settings-outline.svg" alt="icono-configuracion">
                <h2>Configuracion</h2>
            </div>
            <div class="soporte navLat">
                <img src="./img/customer-support.svg" alt="icono-soporte">
                <h2>Soporte</h2>
            </div>
            <div class="privacidad navLat">
                <img src="./img/privacy-tip-outline-rounded.svg" alt="icono-privacidad">
                <h2>Privacidad</h2>
            </div>
        </div>
    </aside>

</body>

</html>
